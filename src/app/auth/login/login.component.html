<div class="d-flex align-items-center justify-content-center min-vh-100 p-3" aria-label="Login page position-relative">
  
  <button class="position-absolute top-0 end-0 m-4 btn btn-link p-0 text-decoration-none" (click)="toggleTheme()" type="button" aria-label="Toggle theme" style="z-index: 10;">
      <i class="fas fs-4" [ngClass]="isLightTheme() ? 'fa-sun text-warning' : 'fa-moon text-white'"></i>
  </button>

  <div class="glass-card p-4 p-md-5 w-100" style="max-width: 440px;" [class.success-anim]="loginSuccess()" aria-live="polite" [@zoomInOnEnter]>
    
    <div class="brand-logo mb-4 text-center" [@fadeInDownOnEnter]>
      <div class="icon-wrapper glass-icon">
        <i class="fas fa-cube fa-bounce" style="--fa-animation-duration: 3s; --fa-bounce-jump-scale-x: 1; --fa-bounce-jump-scale-y: 1;"></i>
      </div>
      <h1 class="brand-text mt-3">{{ 'LOGIN.PORTAL' | translate }}</h1>
    </div>

    <div class="text-center mb-5">
      <h2 class="welcome-text">Welcome Back</h2>
      <p class="text-muted mt-2">Sign in to manage your inventory and operations.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" (reset)="resetForm()" aria-label="Login form" [@fadeInUpOnEnter]>
      
      <!-- Username Field -->
      <div class="glass-input-group mb-4">
        <i class="fas fa-user input-icon fa-fade" style="--fa-animation-duration: 2s;"></i>
        <input type="text" id="username" class="glass-input" formControlName="username" required autocomplete="username" placeholder=" " />
        <label for="username" class="glass-label">{{ 'LOGIN.USERNAME' | translate }}</label>
        
        <div class="glass-invalid-feedback" *ngIf="isSubmitted() && username?.invalid">
          <span *ngIf="username?.errors?.['required']"><i class="fas fa-exclamation-circle me-1"></i>{{ 'LOGIN.ERRORS.REQUIRED' | translate }}</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="glass-input-group mb-4">
        <i class="fas fa-lock input-icon fa-fade" style="--fa-animation-duration: 2s; --fa-animation-delay: 1s;"></i>
        <input [type]="showPassword() ? 'text' : 'password'" id="password" class="glass-input pe-5" formControlName="password" required autocomplete="current-password" placeholder=" " />
        <label for="password" class="glass-label">{{ 'LOGIN.PASSWORD' | translate }}</label>
        
        <button type="button" class="btn-toggle-pass" (click)="togglePassword()" aria-label="Toggle password visibility">
          <i class="fas" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
        </button>

        <div class="glass-invalid-feedback" *ngIf="isSubmitted() && password?.invalid">
          <span *ngIf="password?.errors?.['required']"><i class="fas fa-exclamation-circle me-1"></i>{{ 'LOGIN.ERRORS.REQUIRED' | translate }}</span>
          <span *ngIf="password?.errors?.['minlength']"><i class="fas fa-exclamation-circle me-1"></i>{{ 'LOGIN.ERRORS.MIN_LENGTH' | translate }}</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-glow w-100 mt-2" [disabled]="isLoading()" aria-live="polite">
        <ng-container *ngIf="!isLoading()">
          <span>{{ 'LOGIN.SUBMIT' | translate }}</span>
          <i class="fas fa-arrow-right ms-2 transition-icon"></i>
        </ng-container>
        <ng-container *ngIf="isLoading()">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <span>{{ 'LOGIN.AUTHENTICATING' | translate }}</span>
        </ng-container>
      </button>

      <!-- Admin Link -->
      <div class="text-center mt-4 pt-2">
        <a routerLink="/admin" class="btn-glass text-decoration-none">
          <i class="fas fa-shield-alt me-1"></i> {{ 'LOGIN.ADMIN_LOGIN' | translate }}
        </a>
      </div>

    </form>
  </div>
</div>
