<app-page-shell
  title="Purchase Order"
  subtitle="Create and manage purchase orders"
  [breadcrumbs]="[{ label: 'Purchase Order' }]">

  <div header-actions>
    <button type="button" class="btn-glow" (click)="submitPurchase()" [disabled]="!purchaseForm.valid">
      <i class="fas fa-paper-plane me-2"></i>Submit PO
    </button>
    <button type="button" class="btn-glass" (click)="addRow()">
      <i class="fas fa-plus me-2 text-primary"></i>Add Item
    </button>
    <button type="button" class="btn btn-danger" (click)="removeSelectedRows()" [disabled]="!hasSelectedRows()">
      <i class="fas fa-trash me-2"></i>Remove Selected
    </button>
    <div class="grand-total ms-3">
      <span class="badge bg-success bg-opacity-25 border border-success text-white fs-6 py-2 px-3">
        <i class="fas fa-calculator me-1"></i>Total: ${{ grandTotal | number:'1.2-2' }}
      </span>
    </div>
  </div>

  <!-- Purchase Order Header -->
  <div class="glass-card mb-3 mt-2" [@slideInLeftOnEnter]>
    <div class="card-header border-bottom border-light border-opacity-10 py-2 px-3">
      <h5 class="mb-0 text-white">
        <i class="fas fa-file-invoice me-2 text-primary"></i>Purchase Order Details
      </h5>
    </div>
    <div class="card-body p-3">
      <form [formGroup]="purchaseForm" class="row">
        
        <div class="col-md-3">
          <div class="d-flex align-items-center gap-2 mb-3">
            <div class="glass-input-group flex-grow-1 mb-0">
              <i class="fas fa-building input-icon"></i>
              <input list="vendorDatalist" id="vendor" type="text" class="glass-input" formControlName="vendor" (blur)="onVendorBlur()" placeholder=" " autocomplete="off" />
              <datalist id="vendorDatalist">
                <option *ngFor="let v of vendors" [value]="v.name"></option>
              </datalist>
              <label for="vendor" class="glass-label">Vendor Name *</label>
              <div class="glass-invalid-feedback" *ngIf="purchaseForm.get('vendor')?.invalid && purchaseForm.get('vendor')?.touched">
                Required
              </div>
            </div>
            <button type="button" class="btn btn-outline-info rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; flex-shrink: 0;" (click)="openVendorModal()" title="Lookup / Create Vendor">
              <i class="fas fa-search"></i>
            </button>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-hashtag input-icon"></i>
            <input id="poNumber" type="text" class="glass-input" formControlName="poNumber" placeholder=" " />
            <label for="poNumber" class="glass-label">PO Number *</label>
            <div class="glass-invalid-feedback" *ngIf="purchaseForm.get('poNumber')?.invalid && purchaseForm.get('poNumber')?.touched">
              Required
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-calendar input-icon"></i>
            <input id="orderDate" type="date" class="glass-input" formControlName="orderDate" placeholder=" " />
            <label for="orderDate" class="glass-label">Order Date</label>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-wallet input-icon"></i>
            <select id="paymentMode" class="glass-input" formControlName="paymentMode">
              <option value="Cash">Cash</option>
              <option value="Credit">Credit</option>
              <option value="UPI">UPI</option>
              <option value="Bank Transfer">Bank Transfer</option>
            </select>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-truck input-icon"></i>
            <input id="expectedDelivery" type="date" class="glass-input" formControlName="expectedDelivery" placeholder=" " />
            <label for="expectedDelivery" class="glass-label">Expected Delivery</label>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-info-circle input-icon"></i>
            <select id="status" class="glass-input" formControlName="status">
              <option value="Pending">Pending</option>
              <option value="Approved">Approved</option>
              <option value="Received">Received</option>
              <option value="Cancelled">Cancelled</option>
            </select>
          </div>
        </div>

        <div class="col-md-6">
          <div class="glass-input-group mb-0">
            <i class="fas fa-comment input-icon"></i>
            <input id="remarks" type="text" class="glass-input" formControlName="remarks" placeholder=" " />
            <label for="remarks" class="glass-label">Remarks</label>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Purchase Items Grid -->
  <div class="glass-card" [@fadeInUpOnEnter]>
    <div class="card-header border-bottom border-light border-opacity-10 d-flex justify-content-between align-items-center py-2 px-3">
      <h5 class="mb-0 text-white">
        <i class="fas fa-list me-2 text-primary"></i>Purchase Items ({{ purchaseItems.length }})
      </h5>
      <div class="d-flex gap-3 align-items-center">
        <div class="glass-input-group m-0" style="width: 200px;">
          <i class="fas fa-search input-icon" style="font-size: 0.9rem;"></i>
          <input type="text" class="glass-input py-2" placeholder=" " [(ngModel)]="searchText" (input)="onSearchChange()" />
          <label class="glass-label" style="font-size: 0.8rem;">Search</label>
        </div>
        <button type="button" class="btn-glass btn-sm" (click)="exportToCsv()">
          <i class="fas fa-download me-1"></i>Export
        </button>
      </div>
    </div>
    
    <div class="card-body p-0">
      <div class="table-container">
        <table mat-table [dataSource]="dataSource" class="w-100">

          <!-- Checkbox Column -->
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef>
              <mat-checkbox (change)="toggleAllRows()"
                            [checked]="isAllSelected()"
                            [indeterminate]="selection.hasValue() && !isAllSelected()">
              </mat-checkbox>
            </th>
            <td mat-cell *matCellDef="let row">
              <mat-checkbox (click)="$event.stopPropagation()"
                            (change)="selection.toggle(row)"
                            [checked]="selection.isSelected(row)">
              </mat-checkbox>
            </td>
          </ng-container>

          <!-- Index Column -->
          <ng-container matColumnDef="index">
            <th mat-header-cell *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let i = index">{{ i + 1 }}</td>
          </ng-container>

          <!-- Item ID -->
          <ng-container matColumnDef="itemId">
            <th mat-header-cell *matHeaderCellDef>Item Selection</th>
            <td mat-cell *matCellDef="let row">
              <select class="inline-edit-input" [(ngModel)]="row.itemId" (ngModelChange)="onItemSelect(row, $event)">
                <option value="" disabled selected>Select Item</option>
                <option *ngFor="let item of inventory" [value]="item.itemId">{{ item.itemName }}</option>
              </select>
            </td>
          </ng-container>

          <!-- Item Name -->
          <ng-container matColumnDef="itemName">
            <th mat-header-cell *matHeaderCellDef>Item Name</th>
            <td mat-cell *matCellDef="let row">
              <input class="inline-edit-input" [(ngModel)]="row.itemName" />
            </td>
          </ng-container>

          <!-- Quantity -->
          <ng-container matColumnDef="quantity">
            <th mat-header-cell *matHeaderCellDef>Quantity</th>
            <td mat-cell *matCellDef="let row">
              <input type="number" class="inline-edit-input text-center" [(ngModel)]="row.quantity" min="0" />
            </td>
          </ng-container>

          <!-- Unit Price -->
          <ng-container matColumnDef="unitPrice">
            <th mat-header-cell *matHeaderCellDef>Unit Price</th>
            <td mat-cell *matCellDef="let row">
              <input type="number" class="inline-edit-input text-center" [(ngModel)]="row.unitPrice" min="0" step="0.01" />
            </td>
          </ng-container>

          <!-- Total -->
          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef>Total</th>
            <td mat-cell *matCellDef="let row" class="fw-bold text-center text-accent">
              ${{ computeItemTotal(row) | number:'1.2-2' }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"
              [class.selected]="selection.isSelected(row)">
          </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons></mat-paginator>
      </div>
    </div>
  </div>

  <!-- Shared Vendor Lookup Modal -->
  <app-entity-lookup #vendorLookup type="vendor" (entitySelected)="selectModalVendor($event)"></app-entity-lookup>
</app-page-shell>
