<app-page-shell
  title="Inventory Management"
  subtitle="Manage your inventory items and stock levels"
  [breadcrumbs]="[{ label: 'Inventory' }]">

  <div header-actions>
    <button type="button" class="btn btn-outline-light me-2 rounded-pill px-3" (click)="simulateScan()">
      <i class="fas fa-barcode me-2"></i>Scan Simulation
    </button>
    <button type="button" class="btn-glow" (click)="addInventoryItem()">
      <i class="fas fa-plus me-2"></i>Add Item
    </button>
    <button type="button" class="btn btn-danger" (click)="removeSelectedItems()" [disabled]="!hasSelectedItems()">
      <i class="fas fa-trash me-2"></i>Remove Selected
    </button>
    <div class="low-stock-alert ms-3" *ngIf="lowStockCount > 0">
      <i class="fas fa-exclamation-triangle text-warning me-1"></i>
      <span class="badge bg-warning text-dark">{{ lowStockCount }} Low Stock</span>
    </div>
    <div class="low-stock-alert ms-2" *ngIf="nearExpiryCount > 0">
      <i class="fas fa-clock text-danger me-1"></i>
      <span class="badge bg-danger">{{ nearExpiryCount }} Near Expiry</span>
    </div>
  </div>

  <!-- Add Item Form -->
  <div class="glass-card mb-3 mt-2" [@slideInLeftOnEnter]>
    <div class="card-header border-bottom border-light border-opacity-10 py-2 px-3">
      <h5 class="mb-0 text-white">
        <i class="fas fa-plus-circle me-2 text-primary"></i>Add New Item
      </h5>
    </div>
    <div class="card-body p-3">
      <form [formGroup]="inventoryForm" class="row">
        
        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-barcode input-icon"></i>
            <input id="itemId" type="text" class="glass-input" formControlName="itemId" placeholder=" " />
            <label for="itemId" class="glass-label">Item ID</label>
            <div class="glass-invalid-feedback" *ngIf="inventoryForm.get('itemId')?.invalid && inventoryForm.get('itemId')?.touched">
              Required
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-box input-icon"></i>
            <input id="itemName" type="text" class="glass-input" formControlName="itemName" placeholder=" " />
            <label for="itemName" class="glass-label">Item Name</label>
            <div class="glass-invalid-feedback" *ngIf="inventoryForm.get('itemName')?.invalid && inventoryForm.get('itemName')?.touched">
              Required
            </div>
          </div>
        </div>

        <div class="col-md-2">
          <div class="glass-input-group">
            <i class="fas fa-tags input-icon"></i>
            <input id="category" type="text" class="glass-input" formControlName="category" placeholder=" " />
            <label for="category" class="glass-label">Category</label>
            <div class="glass-invalid-feedback" *ngIf="inventoryForm.get('category')?.invalid && inventoryForm.get('category')?.touched">
              Required
            </div>
          </div>
        </div>

        <div class="col-md-2">
          <div class="glass-input-group">
            <i class="fas fa-layer-group input-icon"></i>
            <input id="stockQty" type="number" class="glass-input" formControlName="stockQty" placeholder=" " min="0" />
            <label for="stockQty" class="glass-label">Stock Qty</label>
            <div class="glass-invalid-feedback" *ngIf="inventoryForm.get('stockQty')?.invalid && inventoryForm.get('stockQty')?.touched">
              Required
            </div>
          </div>
        </div>

        <div class="col-md-2">
          <div class="glass-input-group">
            <i class="fas fa-exclamation-circle input-icon"></i>
            <input id="reorderLevel" type="number" class="glass-input" formControlName="reorderLevel" placeholder=" " min="0" />
            <label for="reorderLevel" class="glass-label">Reorder Lvl</label>
            <div class="glass-invalid-feedback" *ngIf="inventoryForm.get('reorderLevel')?.invalid && inventoryForm.get('reorderLevel')?.touched">
              Required
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-map-marker-alt input-icon"></i>
            <input id="location" type="text" class="glass-input" formControlName="location" placeholder=" " />
            <label for="location" class="glass-label">Location</label>
            <div class="glass-invalid-feedback" *ngIf="inventoryForm.get('location')?.invalid && inventoryForm.get('location')?.touched">
              Required
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-hashtag input-icon"></i>
            <input id="batchNumber" type="text" class="glass-input" formControlName="batchNumber" placeholder=" " />
            <label for="batchNumber" class="glass-label">Batch No.</label>
          </div>
        </div>

        <div class="col-md-3">
          <div class="glass-input-group">
            <i class="fas fa-calendar-times input-icon"></i>
            <input id="expiryDate" type="date" class="glass-input" formControlName="expiryDate" placeholder=" " />
            <label for="expiryDate" class="glass-label">Expiry Date</label>
          </div>
        </div>

        <div class="col-12 text-end">
          <button type="button" class="btn-glow" (click)="addInventoryItem()" [disabled]="inventoryForm.invalid">
            <i class="fas fa-plus me-2"></i>Save Item
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Inventory Grid -->
  <div class="glass-card" [@fadeInUpOnEnter]>
    <div class="card-header border-bottom border-light border-opacity-10 d-flex justify-content-between align-items-center py-2 px-3">
      <h5 class="mb-0 text-white">
        <i class="fas fa-list me-2 text-primary"></i>Inventory Items ({{ inventoryItems.length }})
      </h5>
      <div class="d-flex gap-3 align-items-center">
        <div class="glass-input-group m-0" style="width: 200px;">
          <i class="fas fa-search input-icon" style="font-size: 0.9rem;"></i>
          <input type="text" class="glass-input py-2" placeholder=" " [(ngModel)]="searchText" (input)="onSearchChange()">
          <label class="glass-label" style="font-size: 0.8rem;">Search</label>
        </div>
        <button type="button" class="btn-glass btn-sm" (click)="exportToCsv()">
          <i class="fas fa-download me-1"></i>Export
        </button>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-container">
        <table mat-table [dataSource]="dataSource" matSort class="w-100">

          <!-- Checkbox Column -->
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef>
              <mat-checkbox (change)="toggleAllRows()"
                            [checked]="isAllSelected()"
                            [indeterminate]="selection.hasValue() && !isAllSelected()">
              </mat-checkbox>
            </th>
            <td mat-cell *matCellDef="let row">
              <mat-checkbox (click)="$event.stopPropagation()"
                            (change)="selection.toggle(row)"
                            [checked]="selection.isSelected(row)">
              </mat-checkbox>
            </td>
          </ng-container>

          <!-- Index Column -->
          <ng-container matColumnDef="index">
            <th mat-header-cell *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let i = index">{{ i + 1 }}</td>
          </ng-container>

          <!-- Item ID -->
          <ng-container matColumnDef="itemId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Item ID</th>
            <td mat-cell *matCellDef="let row">
              <input class="inline-edit-input" [(ngModel)]="row.itemId" />
            </td>
          </ng-container>

          <!-- Item Name -->
          <ng-container matColumnDef="itemName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Item Name</th>
            <td mat-cell *matCellDef="let row">
              <input class="inline-edit-input" [(ngModel)]="row.itemName" />
            </td>
          </ng-container>

          <!-- Category -->
          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
            <td mat-cell *matCellDef="let row">
              <input class="inline-edit-input" [(ngModel)]="row.category" />
            </td>
          </ng-container>

          <!-- Stock Qty -->
          <ng-container matColumnDef="stockQty">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Stock Qty</th>
            <td mat-cell *matCellDef="let row">
              <input type="number" class="inline-edit-input text-center" [(ngModel)]="row.stockQty" min="0" />
            </td>
          </ng-container>

          <!-- Reorder Level -->
          <ng-container matColumnDef="reorderLevel">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Reorder Level</th>
            <td mat-cell *matCellDef="let row">
              <input type="number" class="inline-edit-input text-center" [(ngModel)]="row.reorderLevel" min="0" />
            </td>
          </ng-container>

          <!-- Batch Number -->
          <ng-container matColumnDef="batchNumber">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Batch No.</th>
            <td mat-cell *matCellDef="let row">
              <input class="inline-edit-input" [(ngModel)]="row.batchNumber" />
            </td>
          </ng-container>

          <!-- Expiry Date -->
          <ng-container matColumnDef="expiryDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Expiry Date</th>
            <td mat-cell *matCellDef="let row">
              <input type="date" class="inline-edit-input" [(ngModel)]="row.expiryDate" [class.text-danger]="isNearExpiry(row)" />
            </td>
          </ng-container>

          <!-- Location -->
          <ng-container matColumnDef="location">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Location</th>
            <td mat-cell *matCellDef="let row">
              <input class="inline-edit-input" [(ngModel)]="row.location" />
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="text-center"> Adjustment </th>
            <td mat-cell *matCellDef="let row" class="text-center">
              <div class="d-flex justify-content-center gap-1">
                <button class="adj-btn plus" (click)="manualAdjustment(row, 1)" title="Add 1"> + </button>
                <button class="adj-btn minus" (click)="manualAdjustment(row, -1)" title="Sub 1"> - </button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"
              [class.selected]="selection.isSelected(row)"
              [class.low-stock-row]="isLowStock(row)">
          </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons></mat-paginator>
      </div>
    </div>
  </div>
</app-page-shell>
