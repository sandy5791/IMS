<app-page-shell
  title="Sales Order"
  subtitle="Create and manage sales orders"
  [breadcrumbs]="[{ label: 'Sales Order' }]">

  <div header-actions>
    <button type="button" class="btn-glow" (click)="submitForm()" [disabled]="!salesOrderForm.valid">
      <i class="fas fa-paper-plane me-2"></i>Submit Order
    </button>
    <button type="button" class="btn-glass" (click)="addSalesItem()">
      <i class="fas fa-plus me-2 text-primary"></i>Add Item
    </button>
    <button type="button" class="btn btn-danger" (click)="removeSelectedRows()" [disabled]="!hasSelectedRows()">
      <i class="fas fa-trash me-2"></i>Remove Selected
    </button>
    <div class="order-total ms-3">
      <span class="badge bg-primary bg-opacity-25 border border-primary text-white fs-6 py-2 px-3">
        <i class="fas fa-calculator me-1"></i>Total: ${{ computeOrderTotal() | number:'1.2-2' }}
      </span>
    </div>
  </div>

  <!-- Customer Information Form -->
  <div class="glass-card mb-3 mt-2" [@slideInLeftOnEnter]>
    <div class="card-header border-bottom border-light border-opacity-10 py-2 px-3">
      <h5 class="mb-0 text-white">
        <i class="fas fa-user-circle me-2 text-primary"></i>Customer Information
      </h5>
    </div>
    <div class="card-body p-3">
      <form [formGroup]="salesOrderForm" class="row">

        <!-- Name -->
        <div class="col-md-6">
          <div class="d-flex align-items-center gap-2 mb-3">
            <div class="glass-input-group flex-grow-1 mb-0">
              <i class="fas fa-user input-icon"></i>
              <input list="customersDatalist" id="Name" type="text" class="glass-input" formControlName="Name" (blur)="onCustomerBlur()" placeholder=" " autocomplete="off" />
              <datalist id="customersDatalist">
                <option *ngFor="let c of customers" [value]="c.name"></option>
              </datalist>
              <label for="Name" class="glass-label">Customer Name *</label>
              <div class="glass-invalid-feedback" *ngIf="salesOrderForm.get('Name')?.invalid && salesOrderForm.get('Name')?.touched">
                Required
              </div>
            </div>
            <button type="button" class="btn btn-outline-info rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; flex-shrink: 0;" (click)="openCustomerModal()" title="Lookup / Create Customer">
              <i class="fas fa-search"></i>
            </button>
          </div>
        </div>

        <!-- Contact -->
        <div class="col-md-6">
          <div class="glass-input-group">
            <i class="fas fa-phone input-icon"></i>
            <input type="text" id="contact" class="glass-input" formControlName="contact" placeholder=" " />
            <label for="contact" class="glass-label">Contact Number *</label>
            <div class="glass-invalid-feedback" *ngIf="salesOrderForm.get('contact')?.invalid && salesOrderForm.get('contact')?.touched">
              Required
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="col-md-6">
          <div class="glass-input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="glass-input" formControlName="email" placeholder=" " />
            <label for="email" class="glass-label">Email Address</label>
            <div class="glass-invalid-feedback" *ngIf="salesOrderForm.get('email')?.invalid && salesOrderForm.get('email')?.touched">
              Valid email required
            </div>
          </div>
        </div>

        <!-- Loyalty Number -->
        <div class="col-md-6">
          <div class="glass-input-group">
            <i class="fas fa-id-card input-icon"></i>
            <input type="text" id="loyaltyNo" class="glass-input" formControlName="loyaltyNo" placeholder=" " />
            <label for="loyaltyNo" class="glass-label">Loyalty Number</label>
          </div>
        </div>

        <!-- Order Date -->
        <div class="col-md-4">
          <div class="glass-input-group">
            <i class="fas fa-calendar-alt input-icon"></i>
            <input type="date" id="OrderDate" class="glass-input" formControlName="OrderDate" placeholder=" " />
            <label for="OrderDate" class="glass-label">Order Date *</label>
          </div>
        </div>

        <!-- Payment Mode -->
        <div class="col-md-4">
          <div class="glass-input-group">
            <i class="fas fa-credit-card input-icon"></i>
            <select id="paymentMode" class="glass-input" formControlName="paymentMode">
              <option value="" disabled selected>Select payment mode</option>
              <option value="Cash">Cash</option>
              <option value="Card">Card</option>
              <option value="Bank Transfer">Bank Transfer</option>
              <option value="Cheque">Cheque</option>
            </select>
            <div class="glass-invalid-feedback" *ngIf="salesOrderForm.get('paymentMode')?.invalid && salesOrderForm.get('paymentMode')?.touched">
              Required
            </div>
          </div>
        </div>

        <!-- Sales Person -->
        <div class="col-md-4">
          <div class="glass-input-group">
            <i class="fas fa-user-tie input-icon"></i>
            <input type="text" id="SalePerson" class="glass-input" formControlName="SalePerson" readonly placeholder=" " />
            <label for="SalePerson" class="glass-label">Sales Person</label>
          </div>
        </div>

        <!-- Discount -->
        <div class="col-md-6">
          <div class="glass-input-group">
            <i class="fas fa-percent input-icon"></i>
            <input type="number" id="discount" class="glass-input" formControlName="discount" placeholder=" " min="0" max="100" step="0.01" />
            <label for="discount" class="glass-label">Discount (%)</label>
          </div>
        </div>

        <!-- Tax Details -->
        <div class="col-md-6">
          <div class="glass-input-group">
            <i class="fas fa-file-invoice-dollar input-icon"></i>
            <input type="text" id="taxDetails" class="glass-input" formControlName="taxDetails" placeholder=" " />
            <label for="taxDetails" class="glass-label">Tax Details</label>
          </div>
        </div>

        <!-- Remarks -->
        <div class="col-12">
          <div class="glass-input-group mb-0">
            <i class="fas fa-comment-alt input-icon" style="top: 1.5rem; transform: none;"></i>
            <textarea id="Remarks" class="glass-input" formControlName="Remarks" rows="2" placeholder=" "></textarea>
            <label for="Remarks" class="glass-label" style="top: 1.5rem; transform: none;">Remarks</label>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Order Items Grid -->
  <div class="glass-card" [@fadeInUpOnEnter]>
    <div class="card-header border-bottom border-light border-opacity-10 d-flex justify-content-between align-items-center py-2 px-3">
      <h5 class="mb-0 text-white">
        <i class="fas fa-list me-2 text-primary"></i>Order Items ({{ salesDtlArr.length }})
      </h5>
      <div class="d-flex gap-3 align-items-center">
        <div class="glass-input-group m-0" style="width: 200px;">
          <i class="fas fa-search input-icon" style="font-size: 0.9rem;"></i>
          <input type="text" class="glass-input py-2" placeholder=" " [(ngModel)]="searchText" (input)="onSearchChange()">
          <label class="glass-label" style="font-size: 0.8rem;">Search</label>
        </div>
        <button type="button" class="btn-glass btn-sm" (click)="exportToCsv()">
          <i class="fas fa-download me-1"></i>Export
        </button>
      </div>
    </div>
    
    <div class="card-body p-0">
      <div class="table-container">
        <table mat-table [dataSource]="dataSource" class="w-100">

          <!-- Checkbox Column -->
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef>
              <mat-checkbox (change)="toggleAllRows()"
                            [checked]="isAllSelected()"
                            [indeterminate]="selection.hasValue() && !isAllSelected()">
              </mat-checkbox>
            </th>
            <td mat-cell *matCellDef="let row">
              <mat-checkbox (click)="$event.stopPropagation()"
                            (change)="selection.toggle(row)"
                            [checked]="selection.isSelected(row)">
              </mat-checkbox>
            </td>
          </ng-container>

          <!-- Index Column -->
          <ng-container matColumnDef="index">
            <th mat-header-cell *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let i = index">{{ i + 1 }}</td>
          </ng-container>

          <!-- Item ID -->
          <ng-container matColumnDef="itemId">
            <th mat-header-cell *matHeaderCellDef>Item Selection</th>
            <td mat-cell *matCellDef="let row">
              <select class="inline-edit-input" [(ngModel)]="row.itemId" (ngModelChange)="onItemSelect(row, $event)">
                <option value="" disabled selected>Select Item</option>
                <option *ngFor="let item of inventory" [value]="item.itemId">{{ item.itemName }} ({{ item.stockQty }} in stock)</option>
              </select>
            </td>
          </ng-container>

          <!-- Item Name -->
          <ng-container matColumnDef="itemName">
            <th mat-header-cell *matHeaderCellDef>Item Name</th>
            <td mat-cell *matCellDef="let row">
              <input class="inline-edit-input" [(ngModel)]="row.itemName" />
            </td>
          </ng-container>

          <!-- Quantity -->
          <ng-container matColumnDef="quantity">
            <th mat-header-cell *matHeaderCellDef>Quantity</th>
            <td mat-cell *matCellDef="let row">
              <input type="number" class="inline-edit-input text-center" [(ngModel)]="row.quantity" min="0" />
            </td>
          </ng-container>

          <!-- Price -->
          <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef>Price</th>
            <td mat-cell *matCellDef="let row">
              <input type="number" class="inline-edit-input text-center" [(ngModel)]="row.price" min="0" step="0.01" />
            </td>
          </ng-container>

          <!-- Discount -->
          <ng-container matColumnDef="discount">
            <th mat-header-cell *matHeaderCellDef>Discount (%)</th>
            <td mat-cell *matCellDef="let row">
              <input type="number" class="inline-edit-input text-center" [(ngModel)]="row.discount" min="0" max="100" />
            </td>
          </ng-container>

          <!-- Total -->
          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef>Total</th>
            <td mat-cell *matCellDef="let row" class="fw-bold text-center text-accent">
              ${{ computeItemTotal(row) | number:'1.2-2' }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"
              [class.selected]="selection.isSelected(row)">
          </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10, 25]" [pageSize]="10" showFirstLastButtons></mat-paginator>
      </div>
    </div>
  </div>

  <!-- Back to Top Button -->
  <button appBackToTop [scrollContainer]="scrollContainer" type="button" class="btn-glow position-fixed back-to-top-btn"
          [class.show]="isBackToTopVisible" style="bottom: 20px; right: 20px; z-index: 1050; border-radius: 50%; width: 50px; height: 50px; padding: 0;">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- Shared Customer Lookup Modal -->
  <app-entity-lookup #customerLookup type="customer" (entitySelected)="selectModalCustomer($event)"></app-entity-lookup>

</app-page-shell>
